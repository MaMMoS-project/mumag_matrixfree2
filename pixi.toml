[workspace]
name = "mumag-matrixfree2"
version = "0.1.0"
description = "Matrix-free micromagnetic simulations with JAX"
authors = ["MaMMoS-project"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]

[dependencies]
python = ">=3.11"
numpy = "*"
scipy = "*"
matplotlib = "*"
pyamg = "*"
meshio = "*"
meshpy = "*"
neper = "*"
pip = "*"
pytest = "*"
ruff = "*"
pre-commit = ">=4.6.0,<5"
gmsh = ">=4.12.2,<5"

[target.linux-64.dependencies]
mkl = "*"
mkl-include = "*"
libblas = { version = "*", build = "*mkl" }
sparse_dot_mkl = "*"
_openmp_mutex = { version = "*", build = "*_llvm" }
cmake = "*"
make = "*"
cxx-compiler = "*"

[target.linux-64.activation]
scripts = ["activate_build.sh"]

[pypi-dependencies]
jaxopt = "*"

[feature.cpu.pypi-dependencies]
jax = "*"

[feature.cuda.pypi-dependencies]
jax = { version = "*", extras = ["cuda12"] }

[environments]
default = ["cpu"]
cpu = ["cpu"]
cuda = ["cuda"]

[tasks]
# Run unit tests. Usage: pixi run test
test = "JAX_ENABLE_X64=True pytest tests/"

# Run the demagnetization curve sample.
# CPU: pixi run sample
# GPU: pixi run -e cuda sample
sample = { cmd = "cd samples && ./run_cube.sh" }

# Run the demagnetization curve sample on GPU.
# Usage: pixi run sample-gpu
sample-gpu = { cmd = "cd samples && ./run_cube.sh", default-environment = "cuda" }

# Submit the sphere sample on GPU.
# Usage: pixi run submit-sphere-gpu
submit-sphere-gpu = { cmd = "cd samples && sbatch run_sphere.slurm", default-environment = "cuda" }

# Clean temporary mesh files
clean-samples = "rm -rf samples/*.npz samples/bench_demag_curve samples/hyst_sphere_40nm samples/*.vtu samples/*.log"
